<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f4; padding-bottom: 60px; }
        .header { padding: 15px; font-size: 20px; font-weight: bold; background: #fff; border-bottom: 1px solid #ddd; }
        
        /* Inline Ads Style */
        .inline-ads { background: #fff; padding: 10px; margin: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .sub-btn { background: #0088cc; color: #fff; border: none; padding: 10px; width: 100%; margin-top: 10px; font-weight: bold; }
        
        /* Video List Item */
        .video-item { display: flex; align-items: center; padding: 10px; background: #fff; margin-bottom: 5px; }
        .thumb { width: 100px; height: 60px; background: #ddd; margin-right: 10px; }
        .info { flex: 1; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #fff; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; color: #888; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #0088cc; }
        
        .page { display: none; }
        .page.active { display: block; }

        /* Ad Overlay */
        #adOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #fff; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div class="header">Downloader</div>

<!-- Home Page -->
<div id="homePage" class="page active">
    <div class="inline-ads">
        <div>Limited Offer</div>
        <div style="font-size: 14px;">Get a new Bonus offer today! Dial *555# or use the MPT4U app to redeem.</div>
        <button class="sub-btn">SUBSCRIBE</button>
    </div>
    
    <div class="video-item" onclick="showAd()">
        <div class="thumb"></div>
        <div class="info">Video Title 01</div>
    </div>
</div>

<!-- Downloads Page -->
<div id="downloadsPage" class="page">
    <div class="video-item">
        <div class="thumb"></div>
        <div class="info">Auto Downloaded File</div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home')">🏠<br>Home</div>
    <div class="nav-item" onclick="switchPage('downloads')">⬇️<br>Downloads</div>
</div>

<!-- Ad Overlay -->
<div id="adOverlay">
    <p id="timerText">Please wait 5 seconds...</p>
</div>

<script>
    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function showAd() {
        const overlay = document.getElementById('adOverlay');
        const timerText = document.getElementById('timerText');
        overlay.style.display = 'flex';
        let count = 5;
        
        let interval = setInterval(() => {
            count--;
            timerText.innerText = "Please wait " + count + " seconds...";
            if(count <= 0) {
                clearInterval(interval);
                overlay.style.display = 'none';
                alert("Auto Downloading now...");
                switchPage('downloads');
            }
        }, 1000);
    }
</script>

</body>
</html>
