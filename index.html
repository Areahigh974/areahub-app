<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Hub Land</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            width: 100%;
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            border-bottom: 2px solid #ff9900;
            color: #ff9900;
            position: absolute;
            top: 0;
        }
        .player-container {
            width: 90%;
            max-width: 500px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.2);
        }
        .video-placeholder {
            width: 100%;
            height: 250px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            position: relative;
        }
        .play-btn {
            background-color: #ff9900;
            color: #000;
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .ad-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .ad-btn {
            background-color: #ff9900;
            color: #000;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">🔞 AREA HUB PREMIUM</div>

    <div class="player-container">
        <div class="video-placeholder">
            <button class="play-btn" id="mainPlay">▶</button>
            
            <!-- Ad Overlay System -->
            <div class="ad-overlay" id="adArea">
                <div style="color: #ff9900; font-size: 18px; font-weight: bold; margin-bottom: 5px;">SPONSORED ADVERTISEMENT</div>
                <div id="countdown" style="font-size: 14px; color: #aaa;">Please wait <span id="time">5</span>s to skip...</div>
                <button class="ad-btn" id="skipBtn" style="display:none;">SKIP AD & PLAY VIDEO</button>
            </div>
        </div>
        <p style="color: #ff9900; margin-top: 15px; font-weight: bold; font-size: 14px;">XVideos Premium Player System v1.0</p>
    </div>

    <script>
        // Initialize Telegram WebApp
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        let count = 5;
        const timer = setInterval(() => {
            count--;
            document.getElementById('time').innerText = count;
            if(count <= 0) {
                clearInterval(timer);
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('skipBtn').style.display = 'block';
            }
        }, 1000);

        document.getElementById('skipBtn').addEventListener('click', () => {
            document.getElementById('adArea').style.display = 'none';
        });

        document.getElementById('mainPlay').addEventListener('click', () => {
            alert('Video Player Streaming Started!');
        });
    </script>
</body>
</html>
