<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Hub Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* Header အမြဲတမ်း အပေါ်မှာ ရှိနေစေရန် (Fixed) */
        .fixed-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #000;
        }
        .nav-bar { background-color: #1a1a1a; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #ff9900; }
        .logo-text { color: #ffffff; font-size: 24px; font-weight: bold; }
        .logo-text span { color: #ff9900; }
        .search-container { padding: 10px 15px; background-color: #111; display: flex; gap: 8px; border-bottom: 1px solid #333; }
        .search-input { flex: 1; padding: 8px; background-color: #222; border: 1px solid #333; color: #fff; border-radius: 4px; }
        .search-btn { background-color: #ff9900; color: #000; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        /* Content area */
        .page-content { padding-top: 5px; }
        .inline-ad { background-color: #222; margin: 10px; padding: 12px; border-radius: 4px; border: 1px dashed #ff9900; text-align: center; }
        .inline-ad-title { color: #ff4500; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .inline-ad-text { color: #ddd; font-size: 14px; }

        .home-title { padding: 12px; font-size: 15px; font-weight: bold; color: #ff9900; background-color: #0d0d0d; border-left: 3px solid #ff9900; }
        .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }
        .related-card { background-color: #111; border-radius: 4px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .related-thumb { width: 100%; height: 100px; background-color: #222; position: relative; }
        .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); color: #ff9900; font-size: 10px; padding: 1px 3px; border-radius: 2px; }
        .related-info { padding: 6px; }
        .related-title { font-size: 12px; font-weight: bold; color: #ccc; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-stats { display: flex; justify-content: space-between; padding: 0 6px 6px 6px; font-size: 10px; color: #666; }

        /* Player Page */
        .player-page { display: none; }
        .back-home-row { padding: 10px 15px; }
        .back-btn { background: none; border: none; color: #ff9900; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .main-player-box { width: 100%; background-color: #111; position: relative; }
        .video-screen { width: 100%; height: 230px; background-color: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .play-trigger-btn { background-color: #ff9900; color: #000; border: none; border-radius: 50%; width: 65px; height: 65px; font-size: 28px; cursor: pointer; font-weight: bold; z-index: 10; }
        .actual-video { width: 100%; height: 100%; display: none; object-fit: contain; }
        .inline-ad-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.96); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 15; }
        .ad-msg-box { color: #ff9900; font-size: 15px; font-weight: bold; text-align: center; margin-bottom: 12px; }
        .ad-skip-btn { background-color: #ff9900; color: #000; padding: 8px 20px; border: none; border-radius: 4px; font-weight: bold; font-size: 13px; cursor: pointer; display: none; }
        
        .video-details { padding: 12px; border-bottom: 1px solid #222; }
        .video-main-title { font-size: 16px; font-weight: bold; color: #fff; margin: 0 0 8px 0; }
        .action-row { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        .action-btn { background-color: #1a1a1a; color: #ff9900; border: 1px solid #333; padding: 8px 14px; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .comments-section { padding: 15px; background-color: #111; }
        .comment-input-box { width: 100%; padding: 8px; background-color: #222; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; margin-top: 8px; }
        .comment-list { margin-top: 12px; font-size: 13px; color: #bbb; }
        .download-ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .countdown-msg { color: #ff9900; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .skip-btn { background-color: #ff9900; color: #000; padding: 10px 24px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <!-- Fixed Header (အမြဲပေါ်နေမည့် Search Bar) -->
    <div class="fixed-header">
        <div class="nav-bar">
            <div class="logo-text">❌<span>VIDEOS</span></div>
            <div style="font-size: 12px; color: #ff9900; font-weight: bold;">PREMIUM CLUB</div>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search videos...">
            <button class="search-btn" id="searchBtn">Search</button>
        </div>
    </div>

    <div class="page-content">
        <!-- HOME PAGE -->
        <div id="homePage">
            <div class="inline-ad">
                <div class="inline-ad-title">🔥 CHATURBATE INLINE ADS</div>
                <div class="inline-ad-text">SHE DOESN'T PLAY INNOCENT 😈</div>
            </div>
            <div class="home-title">FEATURED PREMIUM VIDEOS</div>
            <div class="related-grid" id="homeGrid">
                <!-- Video Cards Here -->
                <div class="related-card" onclick="loadVideoPage('Beautiful Asian Private Show Mix Collection')">
                    <div class="related-thumb"><img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?w=300"></div>
                    <div class="related-info"><div class="related-title">Beautiful Asian Private Show Mix Collection</div></div>
                </div>
            </div>
        </div>

        <!-- PLAYER PAGE -->
        <div class="player-page" id="playerPage">
            <div class="back-home-row"><button class="back-btn" id="backBtn">⬅ Back to Home</button></div>
            <div class="main-player-box">
                <div class="video-screen">
                    <button class="play-trigger-btn" id="inlinePlayBtn">▶</button>
                    <video class="actual-video" id="inlineVideo" controls><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video>
                    <div class="inline-ad-overlay" id="inlineAdOverlay">
                        <div class="ad-msg-box">Sponsored Ad: Video will start in <span id="inlineAdSec">5</span>s...</div>
                        <button class="ad-skip-btn" id="inlineSkipBtn">SKIP AD & PLAY</button>
                    </div>
                </div>
            </div>
            <div class="video-details">
                <h1 class="video-main-title" id="mainTitle">Video Title</h1>
                <div class="action-row">
                    <button class="action-btn" id="downloadBtn">📥 Download</button>
                    <button class="action-btn" id="favoriteBtn">❤️ Favorite</button>
                </div>
            </div>
            <div class="comments-section">
                <input type="text" class="comment-input-box" placeholder="Write a comment...">
            </div>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        function loadVideoPage(title) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('playerPage').style.display = 'block';
            document.getElementById('mainTitle').innerText = title;
            window.scrollTo(0,0);
        }
        document.getElementById('backBtn').onclick = () => {
            document.getElementById('playerPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
        };
        // Inline Ad Logic
        document.getElementById('inlinePlayBtn').onclick = () => {
            document.getElementById('inlinePlayBtn').style.display = 'none';
            document.getElementById('inlineAdOverlay').style.display = 'flex';
            let sec = 5;
            let timer = setInterval(()=>{
                sec--;
                document.getElementById('inlineAdSec').innerText = sec;
                if(sec <= 0) { clearInterval(timer); document.getElementById('inlineSkipBtn').style.display = 'block'; }
            }, 1000);
        };
        document.getElementById('inlineSkipBtn').onclick = () => {
            document.getElementById('inlineAdOverlay').style.display = 'none';
            document.getElementById('inlineVideo').style.display = 'block';
            document.getElementById('inlineVideo').play();
        };
    </script>
</body>
</html>
